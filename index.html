<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a12;
    --bg2:#15131f;
    --gold:#e8c891;
    --gold-soft:#caa56f;
    --text:#f3ecdf;
    --muted:#8a8497;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:radial-gradient(ellipse at 50% 30%, var(--bg2) 0%, var(--bg) 70%);
    color:var(--text);
    font-family:'Tajawal',sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- star field ---------- */
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .star{
    position:absolute;border-radius:50%;background:#fff;
    animation:twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle{from{opacity:.15;}to{opacity:1;}}

  /* Sirius — the brightest star */
  #sirius{
    position:fixed;top:22%;left:50%;transform:translateX(-50%);
    width:6px;height:6px;border-radius:50%;
    background:#fff;z-index:1;
    box-shadow:0 0 8px 2px #fff,0 0 22px 6px var(--gold),0 0 50px 14px rgba(232,200,145,.45);
    animation:pulse 3.5s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:translateX(-50%) scale(1);opacity:.85;}50%{transform:translateX(-50%) scale(1.5);opacity:1;}}

  /* ---------- lock screen ---------- */
  .wrap{position:relative;z-index:2;height:100%;display:flex;align-items:center;justify-content:center;padding:24px;}

  .lock{
    text-align:center;max-width:380px;width:100%;
    animation:rise 1.2s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

  .eyebrow{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    color:var(--gold-soft);letter-spacing:.04em;font-size:1.05rem;margin-bottom:6px;opacity:.85;
  }
  .lock h1{
    font-family:'Cormorant Garamond',serif;font-weight:500;
    font-size:2.4rem;line-height:1.3;margin-bottom:10px;letter-spacing:.01em;
  }
  .hint{color:var(--muted);font-weight:300;font-size:.92rem;margin-bottom:30px;line-height:1.7;}

  .field{position:relative;margin-bottom:18px;}
  .field input{
    width:100%;background:rgba(255,255,255,.04);
    border:1px solid rgba(232,200,145,.25);border-radius:14px;
    padding:16px 18px;color:var(--text);font-family:'Tajawal',sans-serif;
    font-size:1.05rem;text-align:center;letter-spacing:.18em;outline:none;
    transition:border-color .3s,box-shadow .3s,background .3s;
  }
  .field input::placeholder{color:rgba(138,132,151,.6);letter-spacing:.05em;}
  .field input:focus{
    border-color:var(--gold);background:rgba(255,255,255,.06);
    box-shadow:0 0 0 4px rgba(232,200,145,.08),0 0 30px rgba(232,200,145,.12);
  }

  .btn{
    width:100%;border:none;cursor:pointer;border-radius:14px;
    padding:15px;font-family:'Tajawal',sans-serif;font-weight:500;font-size:1rem;
    color:#1a1626;background:linear-gradient(135deg,var(--gold) 0%,var(--gold-soft) 100%);
    transition:transform .2s,box-shadow .3s;letter-spacing:.02em;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(232,200,145,.25);}
  .btn:active{transform:translateY(0);}

  .err{color:#e8a0a0;font-size:.85rem;margin-top:16px;min-height:18px;opacity:0;transition:opacity .3s;font-weight:300;}
  .shake{animation:shake .45s;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-9px);}40%,80%{transform:translateX(9px);}}

  /* ---------- reveal ---------- */
  .reveal{position:fixed;inset:0;z-index:5;display:none;align-items:center;justify-content:center;flex-direction:column;padding:24px;}
  .reveal.show{display:flex;animation:fadein 1.6s ease both;}
  @keyframes fadein{from{opacity:0;}to{opacity:1;}}

  .frame{
    max-width:min(92vw,440px);max-height:78vh;border-radius:18px;overflow:hidden;
    box-shadow:0 0 0 1px rgba(232,200,145,.3),0 30px 80px rgba(0,0,0,.7),0 0 80px rgba(232,200,145,.15);
    animation:zoom 1.8s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes zoom{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
  .frame img{display:block;width:100%;height:auto;}

  .quote{
    font-family:'Tajawal',sans-serif;font-weight:300;
    color:var(--muted);font-size:.95rem;margin-top:28px;text-align:center;
    line-height:2;letter-spacing:.01em;padding:0 16px;
    animation:fadein 2s ease .6s both;
  }

  .caption{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    color:var(--gold-soft);font-size:1.25rem;margin-top:14px;text-align:center;
    animation:fadein 2s ease 1s both;letter-spacing:.02em;
  }
  .imgerr{display:none;color:var(--muted);font-weight:300;text-align:center;max-width:340px;line-height:1.8;}
  .imgerr a{color:var(--gold);}
</style>
</head>
<body>

<div id="stars"></div>
<div id="sirius"></div>

<!-- LOCK SCREEN -->
<div class="wrap" id="lockWrap">
  <div class="lock" id="lockCard">
    <div class="eyebrow">✦</div>
    <h1>from the moon to the star</h1>
    <p class="hint">اكتبي اسم نجمك</p>
    <div class="field">
      <input id="pass" type="password" placeholder="• • • • • •" autocomplete="off" spellcheck="false">
    </div>
    <button class="btn" id="go">افتحي</button>
    <p class="err" id="err">ليس النجم الصحيح... حاولي مرة أخرى ✦</p>
  </div>
</div>

<!-- REVEAL -->
<div class="reveal" id="reveal">
  <div class="frame" id="frame">
    <img id="photo" alt="">
  </div>
  <p class="quote">النُّجُومُ زِينَةُ السَّمَاءِ وَأَنْتِ زِينَةُ الْأَرْضِ، فَأَنْتِ النُّجُومُ وَهُمْ أَنْتِ</p>
  <p class="caption">أَنْتِ ذَاكِرَتِي 🤍</p>
  <p class="imgerr" id="imgerr">
    تعذّر تحميل الصورة. تأكد أن إعداد المشاركة على Google Drive هو
    «Anyone with the link».
  </p>
</div>

<script>
  /* ---- generate twinkling stars ---- */
  (function(){
    const sky=document.getElementById('stars');
    const n=140;
    for(let i=0;i<n;i++){
      const s=document.createElement('div');
      s.className='star';
      const size=Math.random()*2+0.5;
      s.style.width=size+'px';
      s.style.height=size+'px';
      s.style.left=Math.random()*100+'%';
      s.style.top=Math.random()*100+'%';
      s.style.setProperty('--dur',(Math.random()*3+1.5)+'s');
      s.style.animationDelay=(Math.random()*3)+'s';
      sky.appendChild(s);
    }
  })();

  /* ---- password logic ---- */
  const PASSWORD = "sirius";

  // Google Drive image — primary + fallback sources
  const FILE_ID = "194q8VBUORW1sIIpR0iu3ysPrrv5G2f2C";
  const SOURCES = [
    "https://drive.google.com/thumbnail?id="+FILE_ID+"&sz=w2000",
    "https://lh3.googleusercontent.com/d/"+FILE_ID+"=w2000"
  ];

  const passEl=document.getElementById('pass');
  const errEl=document.getElementById('err');
  const cardEl=document.getElementById('lockCard');

  function tryUnlock(){
    const val=(passEl.value||"").trim().toLowerCase();
    if(val===PASSWORD){ unlock(); }
    else{
      errEl.style.opacity=1;
      cardEl.classList.remove('shake');
      void cardEl.offsetWidth;        // restart animation
      cardEl.classList.add('shake');
      passEl.value="";
    }
  }

  function unlock(){
    const lock=document.getElementById('lockWrap');
    lock.style.transition='opacity .8s ease';
    lock.style.opacity=0;
    setTimeout(()=>{
      lock.style.display='none';
      const reveal=document.getElementById('reveal');
      reveal.classList.add('show');
      loadPhoto();
    },650);
  }

  function loadPhoto(){
    const img=document.getElementById('photo');
    const frame=document.getElementById('frame');
    const imgerr=document.getElementById('imgerr');
    let i=0;
    img.onerror=function(){
      i++;
      if(i<SOURCES.length){ img.src=SOURCES[i]; }
      else{ frame.style.display='none'; imgerr.style.display='block'; }
    };
    img.src=SOURCES[0];
  }

  document.getElementById('go').addEventListener('click',tryUnlock);
  passEl.addEventListener('keydown',function(e){ if(e.key==='Enter') tryUnlock(); });
  passEl.focus();
</script>
</body>
</html>
